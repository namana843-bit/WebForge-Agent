<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebBridge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 340px;
  font-family: 'Outfit', system-ui, -apple-system, sans-serif;
  background: radial-gradient(circle at top right, #181335, #08080c);
  color: #f1f1f7;
  font-size: 13px;
  overflow: hidden;
}
.container {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ef4444;
  flex-shrink: 0;
  box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
  transition: all 0.3s ease;
}
.status-dot.connected {
  background: #10b981;
  box-shadow: 0 0 10px rgba(16, 185, 129, 0.7);
}
h1 {
  font-size: 15px;
  font-weight: 700;
  background: linear-gradient(135deg, #a78bfa, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  flex: 1;
}
.status-text {
  color: #9ca3af;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.url-bar {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 6px;
  padding: 8px 10px;
  word-break: break-all;
  font-size: 11px;
  color: #cbd5e1;
  backdrop-filter: blur(10px);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
}
.controls {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}
.controls button {
  padding: 6px 4px;
  background: linear-gradient(135deg, rgba(167, 139, 250, 0.08), rgba(244, 114, 182, 0.08));
  color: #e9d5ff;
  border: 1px solid rgba(167, 139, 250, 0.2);
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  backdrop-filter: blur(5px);
}
.controls button:hover {
  background: linear-gradient(135deg, rgba(167, 139, 250, 0.2), rgba(244, 114, 182, 0.2));
  border-color: rgba(167, 139, 250, 0.35);
  transform: translateY(-1px);
  box-shadow: 0 3px 8px rgba(167, 139, 250, 0.12);
}
.controls button:active {
  transform: translateY(0);
  background: linear-gradient(135deg, rgba(167, 139, 250, 0.3), rgba(244, 114, 182, 0.3));
}
.log {
  background: rgba(8, 8, 12, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.05);
  border-radius: 6px;
  padding: 8px;
  height: 180px;
  overflow-y: auto;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  line-height: 1.5;
  box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4);
}
.log::-webkit-scrollbar {
  width: 4px;
}
.log::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.12);
  border-radius: 2px;
}
.log .info { color: #93c5fd; }
.log .ok { color: #34d399; text-shadow: 0 0 6px rgba(52, 211, 153, 0.2); }
.log .err { color: #f87171; text-shadow: 0 0 6px rgba(248, 113, 113, 0.2); }
.log .time { color: #6b7280; margin-right: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1>WebBridge</h1>
    <span class="status-text" id="statusText">Disconnected</span>
  </div>
  <div class="url-bar" id="urlBar">No page loaded</div>
  <div class="controls">
    <button id="btnSnapshot">Snapshot</button>
    <button id="btnSS">SS</button>
    <button id="btnURL">URL</button>
    <button id="btnClear">Clear</button>
  </div>
  <div class="controls">
    <button id="btnScrollFast" style="background:linear-gradient(135deg,rgba(52,211,153,0.12),rgba(16,185,129,0.12));border-color:rgba(52,211,153,0.25);color:#6ee7b7">Scroll Fast</button>
    <button id="btnScrollSlow" style="background:linear-gradient(135deg,rgba(96,165,250,0.12),rgba(59,130,246,0.12));border-color:rgba(96,165,250,0.25);color:#93c5fd">Scroll Slow</button>
    <button id="btnScrollStop" style="background:linear-gradient(135deg,rgba(248,113,113,0.12),rgba(239,68,68,0.12));border-color:rgba(248,113,113,0.25);color:#fca5a5">Stop</button>
  </div>
  <div class="log" id="log"></div>
</div>
<script src="popup.js"></script>
</body>
</html>
