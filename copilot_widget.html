<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS AI Copilot - Premium Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #6366f1;
            --accent-gradient: linear-gradient(135deg, #6366f1, #3b82f6);
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
        }

        #copilot-container {
            width: 440px;
            height: 600px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.3);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-dot {
            width: 12px;
            height: 12px;
            background: var(--accent-gradient);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-color);
            position: relative;
        }

        .logo-dot::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 1px solid var(--accent-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; }
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .connection-status {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            background: var(--success-color);
            border-radius: 50%;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Custom scrollbar */
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            animation: messageFadeIn 0.3s ease-out;
        }

        @keyframes messageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.system {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-top-left-radius: 4px;
        }

        .message.user {
            background: var(--accent-gradient);
            color: white;
            align-self: flex-end;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            background: rgba(15, 23, 42, 0.3);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            height: 48px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: white;
            padding: 0 16px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        button {
            height: 48px;
            padding: 0 20px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .suggested-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 0 24px 16px;
            background: rgba(15, 23, 42, 0.3);
        }

        .action-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-chip:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div id="copilot-container">
        <div class="header">
            <div class="header-left">
                <div class="logo-dot"></div>
                <div class="title">SaaS AI Copilot</div>
            </div>
            <div class="connection-status">
                <div class="status-indicator"></div>
                <span>Copilot Active</span>
            </div>
        </div>

        <div class="chat-area" id="chat-messages">
            <div class="message system">
                Hello! I am your SaaS AI Copilot. I can control this page, fill forms, navigate, or capture visual data for you. Try one of the actions below or type a natural language command!
            </div>
        </div>

        <div class="suggested-actions">
            <div class="action-chip" onclick="sendSuggested('scroll 300')">Scroll Page</div>
            <div class="action-chip" onclick="sendSuggested('screenshot')">Take Screenshot</div>
            <div class="action-chip" onclick="sendSuggested('snapshot')">Analyze DOM</div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type a browser action (e.g. click, scroll)..." onkeypress="handleKeyPress(event)">
            </div>
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');

        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function sendSuggested(action) {
            appendMessage(action, 'user');
            dispatchCommand(action);
        }

        function sendMessage() {
            const val = userInput.value.trim();
            if (!val) return;
            appendMessage(val, 'user');
            userInput.value = '';
            dispatchCommand(val);
        }

        async function dispatchCommand(commandText) {
            // Parse action name and arguments
            const parts = commandText.split(' ');
            const action = parts[0];
            const arg = parts.slice(1).join(' ');

            let argsPayload = {};
            if (action === 'navigate' || action === 'goto') {
                argsPayload = { url: arg };
            } else if (action === 'click') {
                argsPayload = { selector: arg };
            } else if (action === 'fill') {
                const subParts = arg.split(' ');
                argsPayload = { selector: subParts[0], value: subParts.slice(1).join(' ') };
            } else if (action === 'scroll') {
                argsPayload = { y: parseInt(arg) || 300 };
            } else if (action === 'screenshot') {
                argsPayload = { filename: arg || 'copilot_capture.png' };
            }

            try {
                const response = await fetch('http://127.0.0.1:10088/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: action, args: argsPayload })
                });
                const result = await response.json();
                
                if (result.error) {
                    appendMessage(`Error: ${result.error}`, 'system');
                } else {
                    appendMessage(`Success: ${JSON.stringify(result)}`, 'system');
                }
            } catch (err) {
                appendMessage(`Connection Error: ${err.message}`, 'system');
            }
        }
    </script>
</body>
</html>
